      <a class="back" href="/">← Home</a>
      <h1>How This Was Built</h1>
      <p>This entire site was generated by the KISS 3-phase build pipeline:</p>
      <div class="step">
        <h3>Phase 1: <code>npx vite build</code></h3>
        <p>Vite bundles the SSR entry point. Route scanner finds 2 pages + 1 island. Writes <code>.kiss/build-metadata.json</code>.</p>
      </div>
      <div class="step">
        <h3>Phase 2: <code>build:client</code></h3>
        <p>Builds the island client chunks — the counter island becomes a ~1.2 KB lazy-loaded JS file.</p>
      </div>
      <div class="step">
        <h3>Phase 3: <code>build:ssg</code></h3>
        <p>Renders every page to static HTML with Declarative Shadow DOM. Injects client script + PWA manifest. Generates <code>404.html</code>.</p>
      </div>
      <p style="color:#888;font-size:0.8125rem;margin-top:1rem">Result: pure static files. No server. No hydration. Zero runtime JS for static content.</p>
    <!--/lit-part--></template></df-about><!--/lit-part--><?><!--/lit-part-->
