name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --node-modules-dir

      - name: Build kiss-ui (needed for scanPackageIslands test)
        working-directory: packages/kiss-ui
        run: deno task build

      - name: Run kiss-core tests
        run: deno test packages/kiss-core/__tests__/ --allow-read --allow-write --allow-env --coverage

      - name: Run kiss-rpc tests
        run: deno test packages/kiss-rpc/__tests__/ --allow-read --allow-write --coverage

      - name: Run kiss-ui tests
        run: deno test packages/kiss-ui/__tests__/ --allow-read --allow-write --allow-env --coverage

      - name: Run create-kiss tests
        run: deno test packages/create-kiss/__tests__/ --allow-read --allow-write --allow-env --coverage
