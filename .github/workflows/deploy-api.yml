name: Deploy API to Deno Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'demo/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Deploy to Deno Deploy (new platform)
        working-directory: demo
        run: |
          deno deploy \
            --app=kiss-demo-api \
            --prod \
            --org=kiss \
            --token="${{ secrets.DENO_DEPLOY_TOKEN }}" \
            .
