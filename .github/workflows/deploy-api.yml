name: Deploy API to Deno Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'demo/app/routes/api/**'
      - 'demo/serverless.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'
      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: kiss-demo-api
          entrypoint: demo/serverless.ts
          root: demo
