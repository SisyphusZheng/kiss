name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node.js dependencies
        working-directory: docs
        run: npm install

      - name: Phase 1 — SSR bundle
        working-directory: docs
        run: npm run build

      - name: Phase 2 — Client island chunks
        working-directory: docs
        run: npx tsx ../packages/kiss-core/src/cli/build-client.ts

      - name: Phase 3 — SSG static HTML
        working-directory: docs
        run: npx tsx ../packages/kiss-core/src/cli/build-ssg.ts

      - name: Install demo dependencies
        working-directory: demo-app
        run: npm install

      - name: Demo Phase 1 — SSR bundle
        working-directory: demo-app
        run: npx vite build

      - name: Demo Phase 2 — Client island chunks
        working-directory: demo-app
        run: npx tsx ../packages/kiss-core/src/cli/build-client.ts

      - name: Demo Phase 3 — SSG static HTML
        working-directory: demo-app
        run: npx tsx ../packages/kiss-core/src/cli/build-ssg.ts

      - name: Combine docs + demo output
        run: |
          cp -r demo-app/dist docs/dist/demo

      - name: Deploy to gh-pages branch
        run: |
          cd docs/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "kiss.js.org" > CNAME
          git add -A
          git commit -m "Deploy KISS docs site — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
